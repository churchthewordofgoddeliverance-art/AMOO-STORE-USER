# Netlify Configuration for AMOO STORE

[build]
  # No build step needed - static files
  command = "echo 'Static site - no build needed'"
  publish = "."

# Redirect all API calls to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://amoostore.onrender.com/api/:splat"
  status = 200
  force = true

# Admin panel routes to admin/admin.html
[[redirects]]
  from = "/admin"
  to = "/admin/admin.html"
  status = 200

# Admin folder routes
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# Redirect routes without file extensions to index.html for SPA routing
# This pattern only matches paths without dots (no file extensions)
[[redirects]]
  from = "/:path([^.]+)"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

# Cache static assets
[[headers]]
  for = "/*.{js,css,woff2,png,jpg,svg}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
